services:
  db:
    image: postgres:16-alpine
    container_name: financeup-db
    environment:
      POSTGRES_DB: financeup
      POSTGRES_USER: financeup
      POSTGRES_PASSWORD: financeup
    volumes:
      - financeup_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeup -d financeup"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: financeup-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: financeup-backend
    command: sh -c "python manage.py migrate --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ..:/app
    environment:
      DJANGO_SECRET_KEY: financeup-docker-secret-key
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: financeup
      DB_USER: financeup
      DB_PASSWORD: financeup
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: financeup-celery
    command: celery -A backend worker -l info
    volumes:
      - ..:/app
    environment:
      DJANGO_SECRET_KEY: financeup-docker-secret-key
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: financeup
      DB_USER: financeup
      DB_PASSWORD: financeup
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  financeup_db_data:
